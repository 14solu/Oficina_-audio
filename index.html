<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizonte Binário - Ivaiporã</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0c;
        }

        /* Imagem de Fundo */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./fundo.png'); /* Substituir pela sua imagem gerada */
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) blur(2px);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-weight: 600; margin-bottom: 5px; color: #00d4ff; letter-spacing: 1px; }
        p.subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 30px; }

        /* Player Customizado */
        .player-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        #playPauseBtn {
            background: #00d4ff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #playPauseBtn:hover { transform: scale(1.1); background: #00b8e6; }

        .timeline-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #00d4ff;
            cursor: pointer;
        }

        /* YouTube Wrapper */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin-top: 30px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .lyrics-section {
            margin-top: 30px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ddd;
            max-height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <h1>Horizonte Binário</h1>
        <p class="subtitle">Estudante de Programação | NRE Ivaiporã</p>

        <div class="player-box">
            <audio id="mainAudio">
                <source src="link_da_musica.mp3" type="audio/mpeg">
            </audio>
            
            <div class="controls">
                <button id="playPauseBtn">▶</button>
            </div>

            <div class="timeline-container">
                <span id="current">0:00</span>
                <input type="range" id="seekSlider" value="0" max="100">
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="lyrics-section">
            <p><strong>[Refrão]</strong><br>
            Código em nuvem, sonho no chão<br>
            Programando o futuro com a palma da mão<br>
            Do NRE pro infinito, eu vou subir<br>
            Meus estudos são a chave pra eu descobrir...</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playPauseBtn');
        const slider = document.getElementById('seekSlider');
        const currentTxt = document.getElementById('current');
        const durationTxt = document.getElementById('duration');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '||';
            } else {
                audio.pause();
                playBtn.innerHTML = '▶';
            }
        });

        audio.ontimeupdate = () => {
            const val = (audio.currentTime / audio.duration) * 100;
            slider.value = val || 0;
            currentTxt.innerText = formatTime(audio.currentTime);
        };

        audio.onloadedmetadata = () => {
            durationTxt.innerText = formatTime(audio.duration);
        };

        slider.oninput = () => {
            audio.currentTime = (slider.value / 100) * audio.duration;
        };

        function formatTime(secs) {
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }
    </script>
</body>
</html>
